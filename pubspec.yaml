name: servit_flutter
description: SERVIT - Service Expert Booking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_leaflet: ^0.1.2
  http: ^1.2.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.5
  intl: ^0.19.0
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_local_notifications: ^18.0.1
  webview_flutter: ^4.10.0
  connectivity_plus: ^6.1.2
  path: ^1.9.1
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
