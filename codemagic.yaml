workflows:
  build-android:
    name: Build Android APK
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true
    scripts:
      - name: Generate Android platform files
        script: flutter create --platforms=android .
      - name: Get dependencies
        script: flutter pub get
      - name: Build Android release APK
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/**/*.apk
    publishing:
      email:
        recipients:
          - builder@servit.app
